<html>
   <head>
      <title>Ex-7-4: Animation</title>

    </head>

      <script 
        src="https://code.jquery.com/jquery-3.7.1.min.js"
        crossorigin="anonymous">
      </script>

    <style>
img {
    position: relative;
    width: 200px; 
    height: 200px; 
}

#prof {
    position: fixed;
    bottom: 0;
    left: 0;
}
      </style>

      <script>
          
$(document).ready(function() {

    $("#button").click(function(){

        $("img:not(#prof)").each(function(index){

            $(this).animate({ left: "+=750px" }, 2000)
                   .animate({ top: "-=20px" }, 150)
                   .animate({ top: "+=20px" }, 150)
                   .animate({ top: "-=20px" }, 150)
                   .animate({ top: "+=20px" }, 150);

        });

    });

});
          
      </script>

	
   <body>
    <h1> Adventures of Tintin </h1>
       <button id="button">Go</button>
       
       <div>
           <img src="images/tintin-milou.jpg"> <br>
           <img src="images/captain-haddock_v2.jpg"> <br>
           <img id="prof" src="images/prof_calcu.jpg"> <br>
           <img src="images/Thomson_&_Thompson.png"> <br>
       </div>
       

   </body>
</html>
