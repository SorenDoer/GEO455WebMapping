<html>
   <head>
      <title>Ex-7-3: Hide/Show CSS manipulation</title>

    </head>

      <script 
        src="https://code.jquery.com/jquery-3.7.1.min.js"
        crossorigin="anonymous">
      </script>

      <style>
           .charac {
               float: left;
           }
           img {
              width: 200px; 
               height: 200px; 
           }
            .wiggle {
    position: relative;
    animation: wiggleAnim 0.4s infinite;
}

@keyframes wiggleAnim {
    0%   { top: 0px; }
    25%  { top: -10px; }
    50%  { top: 0px; }
    75%  { top: 10px; }
    100% { top: 0px; }
}
      </style>

      <script>
          
       $(document).ready(function() {
              $("img").click(function(){
                  $(this).hide();
              });
          }); 
          
         $(document).ready(function() {
              $("#hide-btn").click(function(){
                  $("img.normal").hide();
                  $("img.fast").hide("fast");
                  $("img.slow").hide("slow");
                  $("img.very-slow").hide(2000);
              });

              $("#show-btn").click(function(){
                  $("img.normal").show();
                  $("img.fast").show();               
                  $("img.slow").show("slow");
                  $("img.very-slow").show(2000);
              });
          }); 

        $(document).ready(function() {

            let wiggleOn = false;

            $("#wiggle-btn").click(function(){

                if (!wiggleOn) {
                    $("img").addClass("wiggle");
                    wiggleOn = true;
                } else {
                    $("img").removeClass("wiggle");
                    wiggleOn = false;
                }

            });

        });
          
      </script>

	
   <body>
       <h1> Adventures of Tintin </h1>
       <p> Main Characters </p>
       <div class= "charac">
           <img class="normal" src="images/tintin-milou.jpg">
           <img class="fast" src="images/captain-haddock_v2.jpg">
           <img class="slow" src="images/prof_calcu.jpg">
           <img class="very-slow" src="images/Thomson_&_Thompson.png">
       </div>
       
       <button id='hide-btn'>Hide</button>
       <button id='show-btn'>Show</button>
       <button id="wiggle-btn">Wiggle Images</button>
   </body>
</html>
