    <style>

        .charac {

      <script>
          $(document).ready(function() {
              $("#button-1").click(function(){
                  $("img").addClass("styleclass1"); //try change to toggleClass

              });
              $("#button-2").click(function(){
                  $("img").toggleClass("styleclass1");
              });
          });
                    $(document).ready(function() {

          $(document).ready(function() {
              $("#hide-btn").click(function(){
                  $("img.normal").hide()
                  $("img.fast").hide("fast")
                  $("img.slow").hide("slow")
                  $("img.very-slow").hide(2000)
          }

            <script>
