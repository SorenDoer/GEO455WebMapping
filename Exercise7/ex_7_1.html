<html>
   <head>
      <title>Ex-7-1: DOM manipulation</title>
      <script 
      src="https://code.jquery.com/jquery-4.0.0.min.js" 
      integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" 
      crossorigin="anonymous">
      </script>

      <script>
        // create a reusable design variable to change the css of the element with id test
         var design = {
              color: "Green",
              background: "black",
              border: "3px solid black"
          }

          var design2 = {
              color: "blue",
              background: "black",
              border: "3px solid black"
          }

        $(document).ready(function() {



            $("p:first").css('background-color', 'orange');

            $("button:first").click(function(){
                $("ul:first").css('color', 'green');
                $("#test").css(design);

                $("ul:first").fadeToggle(300).fadeToggle(300);

                $("#resetBtn").click(function(){
                    location.reload();
                });
            });


            $("#p2").css('background-color', 'green');

            $("#btn2").click(function(){
                $("#list2").css('color', 'blue');
                $("#list2").fadeToggle(300).fadeToggle(300);
            });

        });

      </script>

   </head>
	
   <body>
       <h1> Webmapping </h1>

       <p>Technologies we learned</p>

       <ul>
           <li>HTML</li>
           <li>CSS</li>
           <li>JavaScript</li>
           <li>jQuery</li>
       </ul>

       <p id="test">Check console to get the text for list</p> 

       <button>Change list text color</button>
       <button id="resetBtn">Reset Page</button>

       <p id="p2">Technologies we learned</p>

       <ul id="list2">
           <li>HTML</li>
           <li>CSS</li>
           <li>JavaScript</li>
           <li>jQuery</li>
       </ul>

       <button id="btn2">Change text to blue</button>

   </body>
</html>
