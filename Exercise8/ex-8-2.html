<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Ex 8 - Air Quality Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet JavaScript and CSS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        .title-box {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 999;
            background: white;
            padding: 10px 12px;
            border: 1px solid #999;
            border-radius: 6px;
            max-width: 260px;
            line-height: 1.4;
        }

        .legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: white;
            padding: 10px 12px;
            border: 1px solid #999;
            border-radius: 6px;
            line-height: 1.5;
            font-size: 14px;
        }

        .legend i {
            display: inline-block;
            width: 12px;
            height: 12px;
            margin-right: 8px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="title-box">
        <strong>Exercise 8: Current air quality in 11 cities across Africa (Open-Meteo Air Quality API)</strong><br>
        
    </div>

    <div id="map"></div>

    <!-- Legend explaining AQI colors -->
    <div class="legend">
        <strong>AQI Severity</strong><br>
        <div><i style="background: green;"></i>Good (0–50)</div>
        <div><i style="background: yellow;"></i>Moderate (51–100)</div>
        <div><i style="background: orange;"></i>Unhealthy for Sensitive Groups (101–150)</div>
        <div><i style="background: red;"></i>Unhealthy (151–200)</div>
        <div><i style="background: purple;"></i>Very Unhealthy (201–300)</div>
        <div><i style="background: maroon;"></i>Hazardous (301+)</div>
    </div>

    <script>
        // STEP 1: Define a list of cities
        var cities = [
            { name: "Marrakesh", country: "Morocco", population: "1.1 million", lat: 31.679512266837488, lon:  -8.531674681741505},
            { name: "Dakar", country: "Senegal", population: "3.8 million", lat: 14.644284937944175, lon:  -17.898088606812085 },
            { name: "Kumasi", country: "Ghana", population: "4 million", lat: 6.59899061341816, lon: -1.3247895523799889 },
            { name: "Yaounde", country: "Cameroon", population: "5 million", lat: 3.88131588646603, lon: 12.098126529293221 },
            { name: "Windhoek", country: "Namibia", population: "528,415", lat: -22.59743196261294, lon: 17.62118635106616 },
            { name: "Johannesburg", country: "South Africa", population: "6.6 million", lat: -26.133982026999814, lon:  27.419505311684738 },
            { name: "Al-Qahirah (Cairo)", country: "Egypt", population: "25.6 million", lat: 30.213224947032323, lon: 31.57881859801091 },
            { name: "Lilongwe", country: "Malawi", population: "1.5 million", lat: -13.846134629009212, lon: 34.2502417990431 },
            { name: "Nairobi", country: "Kenya", population: "6.5 million", lat: -1.3077563434012724, lon: 37.16956458855826 },
            { name: "N'Djamena", country: "Chad", population: "2 million", lat: 12.360290268271108, lon: 15.551793715990625 },
            { name: "Tunis", country: "Tunesia", population: "2.6 million", lat: 36.88660700394698, lon: 10.969235750074873 }
        ];

        // STEP 2: Build lists of latitude and longitude values
        var latList = [];
        var lonList = [];

        for (var i = 0; i < cities.length; i++) {
            latList.push(cities[i].lat);
            lonList.push(cities[i].lon);
        }

        // Convert the arrays into comma-separated strings for the API request
        latList = latList.join(",");
        lonList = lonList.join(",");

        // STEP 3: Build the API URL
        var apiURL = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${latList}&longitude=${lonList}&current=us_aqi,pm2_5,pm10,nitrogen_dioxide,ozone&timezone=auto`;

        // STEP 4: Create the Leaflet map
        var map = L.map("map").setView([8.81931197424378, 15.724831395629735], 3);

        // STEP 5: Add the basemap
        L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: "&copy; OpenStreetMap contributors"
        }).addTo(map);

        // STEP 6: Helper function to choose marker color based on AQI
        function getAQIColor(aqi) {
            if (aqi <= 50) return "green";
            if (aqi <= 100) return "yellow";
            if (aqi <= 150) return "orange";
            if (aqi <= 200) return "red";
            if (aqi <= 300) return "purple";
            return "maroon";
        }

        // STEP 7: Helper function to choose AQI label
        function getAQILabel(aqi) {
            if (aqi <= 50) return "Good";
            if (aqi <= 100) return "Moderate";
            if (aqi <= 150) return "Unhealthy for Sensitive Groups";
            if (aqi <= 200) return "Unhealthy";
            if (aqi <= 300) return "Very Unhealthy";
            return "Hazardous";
        }

        // STEP 8: Fetch the air quality data
        fetch(apiURL)
            .then(response => response.json())
            .then(data => {
                console.log("Full API response:", data); // Log the full response to understand its structure.
                                                        //  Without logging, you can't easily see what the response looks like in the browser's developer console. 
                                                        //  This helps you verify:
                                                                // If the API call succeeded and returned the expected data.
                                                                // The exact structure (e.g., is data an array? What properties does each item have?).
                                                                // Any errors or unexpected formats (e.g., if coordinates are missing or the API returns an error object).



                // STEP 9: Loop through the returned records
                data.forEach((locationData, index) => {
                    var city = cities[index];

                    // STEP 10: Extract the returned air quality values
                    var aqi = locationData.current.us_aqi;
                    var pm25 = locationData.current.pm2_5;
                    var pm10 = locationData.current.pm10;
                    var no2 = locationData.current.nitrogen_dioxide;
                    var ozone = locationData.current.ozone;

                    // STEP 11: Create a circle marker and style it by AQI severity
                    var marker = L.circleMarker([city.lat, city.lon], {
                        radius: 10,
                        fillColor: getAQIColor(aqi),
                        color: "#222",
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.85
                    }).addTo(map);

                    // STEP 12: Build popup content
                    marker.bindPopup(`
                        <strong>${city.name}, ${city.country}</strong><br>
                        Population: ${city.population}<br>
                        AQI: ${aqi} (${getAQILabel(aqi)})<br>
                        PM2.5: ${pm25} µg/m³<br>
                        PM10: ${pm10} µg/m³<br>
                        NO₂: ${no2} µg/m³<br>
                        Ozone: ${ozone} µg/m³
                    `);
                });
            })
            .catch(error => {
                console.error("Error loading air quality data:", error);
                alert("Could not load air quality data.");
            });
    </script>
</body>
</html>
