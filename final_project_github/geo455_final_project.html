<!doctype html> 
<html lang="en">
<head>
    <title>Final Project</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        html, body, #map {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        #title {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 8px 12px;
            z-index: 1000;
            border-radius: 6px;
            text-align: center;  
        }

        .legend {
            background: white;
            padding: 10px;
            border-radius: 6px;
        }

        #footer {
            position: absolute;
            bottom: 15px;
            right: 45%;
            background: white;
            padding: 4px 12px;
            border-radius: 6px;
            z-index: 1000;
            box-shadow: 0 1px 5px rgba(0,0,0,0.3);
            font-size: 13px;
        }
        
        #legend {
            position: absolute;
            top: 30px;
            right: 15px;

            width: 180px;
            height: 335px;

            background: white;
            border-radius: 6px;
            z-index: 1000;
            box-shadow: 0 1px 5px rgba(0,0,0,0.3);

            padding: 8px 14px;

            display: flex;
            flex-direction: column;
            gap: 6px;

            font-weight: bold;
            font-size: 20px;

            transform: scale(0.75);
            transform-origin: top right;
        }

#legend > div:first-child {
    text-align: center;
    width: 100%;
    margin-bottom: 5px;
}

#legend > div:not(:first-child):not(.aq-title) {
    text-align: left;
    padding-left: 4px;
    font-weight: normal;
}

.leaflet-bottom.leaflet-right {
    margin-right: 15px;
    margin-bottom: 15px;
}

.wind-streak {
    height: 3px;
    background: rgba(0,150,255,0.8);
    position: relative;
    border-radius: 2px;
}

.wind-streak::after {
    content: "";
    position: absolute;
    right: -6px;
    top: -4px;
    border-left: 0.4em solid currentColor;
    border-top: 0.25em solid transparent;
    border-bottom: 0.25em solid transparent;
}
.leaflet-bottom.leaflet-right {
    margin-bottom: 60px;
}
    </style>
</head>

<body>

<h2 id="title">Tracking Wildfires, Wind, and Air Quality in the United States</h2>
<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script src='geo455_final_project_map.js'></script>
    
<div id="legend">
  <div>Map Symbols</div>

  <div>
    <span style="display:inline-block; width:12px; height:12px; border:2px solid red; background:transparent; margin-right:6px;"></span>
    Wildfires
  </div>

  <div>
    <span style="display:inline-block; font-size:16px; margin-right:6px;">➤</span>
    Wind
  </div>

  <div class="aq-title">Air Quality</div>

  <div><span style="display:inline-block; width:12px; height:12px; background:#13ab57; margin-right:6px;"></span>Good</div>
  <div><span style="display:inline-block; width:12px; height:12px; background:#ffde00; margin-right:6px;"></span>Moderate</div>
  <div><span style="display:inline-block; width:12px; height:12px; background:#e47100; margin-right:6px;"></span>Bad</div>
  <div><span style="display:inline-block; width:12px; height:12px; background:#e10000; margin-right:6px;"></span>Very Bad</div>
  <div><span style="display:inline-block; width:12px; height:12px; background:#5d0000; margin-right:6px;"></span>Dangerous</div>
  <div><span style="display:inline-block; width:12px; height:12px; background:#808080; margin-right:6px;"></span>No Data</div>

  <div>
    <span style="display:inline-block; position:relative; width:18px; height:16px; background:#000; border-radius:4px; margin-right:6px;">
      <span style="position:absolute; bottom:-6px; left:50%; transform:translateX(-50%); width:2px; height:6px; background:#333;"></span>
      <span style="position:absolute; bottom:-10px; left:50%; transform:translateX(-50%); width:5px; height:5px; background:#333; border-radius:50%;"></span>
    </span>
    AQI Stations
  </div>
</div>

<div id="footer">
  <a href="about_map.html">About this map...</a>
</div>

</body>
</html>
