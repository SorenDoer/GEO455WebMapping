<!doctype html>
<html lang="en">
<head>
    <title>EONET real-time events</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" integrity="sha512-xodZBNTC5n17Xt2atTPuE1HxjVMSvLVW9ocqUKLsCC5CXdbqCmblAshOMAS6/keqq/sMZMZ19scR4PsZChSR7A==" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js" integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA==" crossorigin=""></script>
   	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
 
   <!-- Leaflet CSS -->
   <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.css">
 
   <!-- Make sure you put the leaflet map library AFTER Leaflet's CSS -->
   <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.js"></script>
   
   <!-- Your choice of Google fonts- make sure to update in CSS file -->
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Playwrite+IN+Guides&family=Playwrite+NZ+Basic+Guides&family=Playwrite+NZ+Basic:wght@100..400&display=swap" rel="stylesheet">
   <link href="https://fonts.googleapis.com/css?family=Lora" rel="stylesheet">
 
   <!-- Your CSS -->
   <link rel="stylesheet" href="styles.css" />
 
     <style>
        body {
            padding: 0;
            margin: 0;
        }
        html, body, #map {
            height: 100%;
            width: 100%;
        }
        
        .leaflet-control.legend {
            background: white;
            padding: 10px;
            line-height: 1.5;
            color: #333;
            border-radius: 5px;
        }
        .legend-color {
            display: inline-block;
            width: 12px;
            height: 12px;
            margin-right: 6px;
            vertical-align: middle;
        }
                        #backButton {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            padding: 8px 12px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-decoration: none;
            color: black;
            font-weight: bold;
        }
        #backButton:hover {
            background: #eee;
        }
    </style>
   </head>

   <body>
   
   <h1 id="title">Final Project</h1>
   
    <div id="map"></div>
    <div id="description"></div>
 <script>

var map = L.map("map").setView([43, -105], 4);

L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attribution/">CartoDB</a>',
    subdomains: "abcd",
    maxZoom: 19
}).addTo(map);

var wildfireUrl = "https://services3.arcgis.com/T4QMspbfLg3qTGWY/arcgis/rest/services/WFIGS_Interagency_Perimeters/FeatureServer/0/query?where=1%3D1&outFields=*&returnGeometry=true&f=geojson";
var radarDisplayOptions = {
  layers: 'nexrad-n0r-900913',
  format: 'image/png',
  transparent: true
};



// Get GeoJSON data from the NWS weather alerts API
var weatherAlertsUrl = 'https://api.weather.gov/alerts/active?region_type=land';

$.getJSON(wildfireUrl, function(data) {
  L.geoJSON(data, {
    style: function(feature) {
      return {
        color: "red",
        weight: 2,
        fillOpacity: 0.3
      };
    },
onEachFeature: function(feature, layer) {
  if (feature.properties) {

    var name =
      feature.properties.IncidentName ||
      feature.properties.FireName ||
      feature.properties.IncidntNm ||
      feature.properties.IRWINID ||
      "Unknown Fire";

    var acres = feature.properties.GISAcres || "N/A";
    var state = feature.properties.POOState || "N/A";

    layer.bindPopup(
      "<b>" + name + "</b><br>" +
      "Acres: " + acres + "<br>" +
      "State: " + state
    );
  }
}
  }).addTo(map);
});

var legend = L.control({ position: "bottomright" });

legend.onAdd = function(map) {
    var div = L.DomUtil.create("div", "legend");
    div.innerHTML += "<b>Weather Alert Severity</b><br>";
    div.innerHTML += '<span class="legend-color" style="background:red"></span>Severe<br>';
    div.innerHTML += '<span class="legend-color" style="background:orange"></span>Moderate';
    return div;
};

legend.addTo(map);


    </script>
 </body>
</html>
