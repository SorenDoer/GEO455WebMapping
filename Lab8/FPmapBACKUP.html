<!doctype html>
<html lang="en">
<head>
    <title>Final Project</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">


    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        html, body, #map {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        #title {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 8px 12px;
            z-index: 1000;
            border-radius: 6px;
        }

        .legend {
            background: white;
            padding: 10px;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<h2 id="title">Current  Wildfires, Winds, and Air Qaulity</h2>
<div id="map"></div>

<script>

var map = L.map("map").setView([43, -95], 4);


var initialCenter = map.getCenter();
var initialZoom = map.getZoom();

var streets = L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
);

var satellite = L.tileLayer(
    "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
);

var terrain = L.tileLayer.wms(
    "https://ows.mundialis.de/services/service?",
    { layers: "SRTM30-Colored-Hillshade" }
);

streets.addTo(map);



// Wildfires
var wildfireUrl =
"https://services3.arcgis.com/T4QMspbfLg3qTGWY/arcgis/rest/services/WFIGS_Interagency_Perimeters/FeatureServer/0/query?where=1%3D1&outFields=*&returnGeometry=true&f=geojson";

var wildfires = L.geoJSON(null, {
    style: function () {
        return {
            color: "red",
            weight: 2,
            fillOpacity: 0.3
        };
    },
    onEachFeature: function (feature, layer) {
        var name = feature.properties.IncidentName || "Unknown";
        var acres = feature.properties.GISAcres || "N/A";

        layer.bindPopup(
            "<b>" + name + "</b><br>Acres: " + acres
        );
    }
}).addTo(map);

$.getJSON(wildfireUrl, function (data) {
    wildfires.addData(data);
});


var airQuality = L.tileLayer(
    "https://tiles.aqicn.org/tiles/usepa-aqi/{z}/{x}/{y}.png?token=413fa902fce2aab54eb47e47c95d3ffa1c696b61"
);

var wind = L.tileLayer(
    "https://{s}.tile.openweathermap.org/map/wind_new/{z}/{x}/{y}.png?appid=b506d0e69b30edeebda75dbf45e30f61"
);


var baseLayers = {
    "Street": streets,
    "Satellite": satellite,
    "Terrain": terrain
};

var overlays = {
    "Wildfires": wildfires,
    "Air Quality": airQuality,
    "Wind": wind
};

L.control.layers(baseLayers, overlays, {
    collapsed: false
}).addTo(map);

// Default layers ON
airQuality.addTo(map);
wind.addTo(map);
    

var resetControl = L.control({ position: "topleft" });

resetControl.onAdd = function () {
    var div = L.DomUtil.create("div", "leaflet-bar leaflet-control");

    div.innerHTML = '<a href="#" title="Reset View" style="display:block; width:120px; text-align:center; padding:6px; font-size:12px;">Return to Initial Extent</a>';


    L.DomEvent.disableClickPropagation(div);

    div.onclick = function (e) {
        e.preventDefault();
        map.setView(initialCenter, initialZoom);
    };

    return div;
};

resetControl.addTo(map);
</script>

</body>
</html>
